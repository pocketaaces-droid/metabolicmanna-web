[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/reset.html"
  to = "/7-day-reset-guide.html"
  status = 301
  force = true

[[redirects]]
  from = "/reset"
  to = "/7-day-reset-guide.html"
  status = 301
  force = true

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'none'"
