[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/reset.html"
  to = "/7-day-reset-guide.html"
  status = 301
  force = true

[[redirects]]
  from = "/reset"
  to = "/7-day-reset-guide.html"
  status = 301
  force = true

[[headers]]
  for = "/downloads/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
